<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Локальная мини-CRM</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>

<div id="loginScreen" class="login-wrapper">
    <div class="card" style="text-align: center; max-width: 400px; margin: 100px auto; padding: 30px;">
        <h2>Вход в систему</h2>
        <div class="form-group" style="margin-bottom: 15px; text-align: left;">
            <label for="usernameInput" style="margin-bottom: 5px; display: block;">Сотрудник</label>
            <select id="usernameInput" style="padding: 10px; width: 100%; border: 1px solid var(--border-color); border-radius: 6px; font-size: 1rem; margin-bottom: 15px; box-sizing: border-box; outline: none;">
                <option value="anton">Антон</option>
                <option value="elena">Елена</option>
                <option value="tatiana">Татьяна</option>
            </select>
            
            <label for="passwordInput" style="margin-bottom: 5px; display: block;">Пароль</label>
            <input type="password" id="passwordInput" placeholder="Введите пароль" onkeydown="if(event.key === 'Enter') checkPassword()" style="padding: 10px; width: 100%; border: 1px solid var(--border-color); border-radius: 6px; font-size: 1rem; box-sizing: border-box; outline: none;">
        </div>
        <button onclick="checkPassword()" style="width: 100%;">Войти</button>
    </div>
</div>

<div class="container" id="crmContainer" style="display: none;">
    <div class="card">
        <h2>Форма создания заявки</h2>
        <form id="appForm">
            <div class="form-grid">
                <div class="form-group">
                    <label for="appId">Номер заявки</label>
                    <input type="text" id="appId" readonly>
                </div>
                <div class="form-group">
                    <label for="workDate">Дата выполнения работ</label>
                    <input type="date" id="workDate" required>
                </div>
                <div class="form-group">
                    <label for="worker">Слесарь</label>
                    <select id="worker" required style="padding: 10px 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 1rem; outline: none;">
                        <option value="" disabled selected>Выберите специалиста</option>
                        <option value="Чепарухин А.">Чепарухин А.</option>
                        <option value="Пермяков А.">Пермяков А.</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="fio">ФИО Заказчика</label>
                    <input type="text" id="fio" required>
                </div>
                <div class="form-group">
                    <label for="phone">Телефон</label>
                    <input type="tel" id="phone" required>
                </div>
                <div class="form-group">
                    <label for="address">Адрес объекта</label>
                    <input type="text" id="address" required>
                </div>
                <div class="form-group">
                    <label for="equipment">Наименование оборудования</label>
                    <input type="text" id="equipment" required>
                </div>
            </div>
            <button type="submit">Сохранить и выгрузить в Word</button>
        </form>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;">История заявок</h2>
            <button type="button" onclick="exportToCSV()" style="background-color: #10b981; color: white; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 0.875rem;">Скачать реестр (Excel)</button>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Дата создания</th>
                        <th>Номер</th>
                        <th>Дата выполнения</th>
                        <th>Слесарь</th>
                        <th>ФИО</th>
                        <th>Телефон</th>
                        <th>Адрес</th>
                        <th>Оборудование</th>
                        <th style="text-align: center;">Статус</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
